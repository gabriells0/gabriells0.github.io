<style>
  :root{
    --neon:#39ff8b;
    --neon-soft:#7dffb4;
    --neon-dim:#1c9c57;
    --ink:#cdeeda;
    --ink-dim:#7fae93;
    --hair:rgba(57,255,139,.2);
    --hair-soft:rgba(57,255,139,.1);
    --panel:rgba(10,40,22,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Space Grotesk",system-ui,sans-serif;
    background:radial-gradient(120% 70% at 50% -5%, #06160c 0%, #030803 55%, #000 100%);
    background-attachment:fixed;color:#fff;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:clamp(3rem,7vw,5rem) 1.5rem 3.5rem;line-height:1.5;
    -webkit-font-smoothing:antialiased;position:relative;
  }
  #rain{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none}
  .wrap{position:relative;z-index:1;width:100%;max-width:720px;display:flex;flex-direction:column;align-items:center}

  header{text-align:center;margin-bottom:clamp(2.4rem,5vw,3.4rem)}
  .title{
    font-family:"Orbitron",sans-serif;font-weight:700;color:#fff;
    font-size:clamp(1.5rem,4.4vw,2.4rem);line-height:1.18;letter-spacing:.06em;
    text-transform:uppercase;display:block;
  }
  .title.en{font-weight:500;color:#fff;margin-top:.55rem}
  .rule{width:60px;height:2px;border-radius:2px;margin:1.5rem auto 1.4rem;
    background:linear-gradient(90deg,transparent,var(--neon),transparent);
    box-shadow:0 0 12px rgba(57,255,139,.85)}
  .author{font-size:.78rem;letter-spacing:.34em;text-transform:uppercase;color:#fff;opacity:.9}

  .editions{display:grid;grid-template-columns:1fr 1fr;gap:clamp(1.1rem,3vw,1.8rem);width:100%}
  .edition{
    background:var(--panel);border:1px solid var(--hair-soft);border-radius:14px;
    padding:clamp(1.2rem,3vw,1.6rem) clamp(1rem,2.5vw,1.4rem) 1.5rem;
    display:flex;flex-direction:column;align-items:center;text-align:center;
    transition:border-color .3s,background .3s,box-shadow .3s;
    backdrop-filter:blur(2px);
  }
  .edition:hover{border-color:var(--hair);background:rgba(10,40,22,.35);box-shadow:0 0 26px rgba(57,255,139,.12)}
  .flag-btn{display:block;cursor:pointer;border:0;background:none;padding:0;width:100%;
    border-radius:8px;overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.55);
    outline-offset:5px;transition:transform .4s cubic-bezier(.2,.7,.2,1),box-shadow .4s}
  .flag-btn svg{display:block;width:100%;height:auto}
  .flag-btn:hover,.flag-btn:focus-visible{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.6),0 0 24px rgba(57,255,139,.25)}
  .flag-btn:focus-visible{outline:2px solid var(--neon)}
  .lang{font-family:"Orbitron",sans-serif;font-weight:600;font-size:.92rem;letter-spacing:.08em;
    text-transform:uppercase;color:#fff;margin:1.25rem 0 .4rem;
    text-shadow:0 0 8px rgba(57,255,139,.4)}
  .hint{font-size:.74rem;color:#fff;letter-spacing:.02em;margin-bottom:1.15rem}
  .dl{display:inline-flex;align-items:center;gap:.5rem;font-size:.72rem;letter-spacing:.18em;
    text-transform:uppercase;font-weight:500;color:#fff;text-decoration:none;
    padding:.62rem 1.2rem;border:1px solid var(--hair);border-radius:999px;
    transition:background .25s,border-color .25s,box-shadow .25s}
  .dl:hover,.dl:focus-visible{background:rgba(57,255,139,.12);border-color:var(--neon);box-shadow:0 0 14px rgba(57,255,139,.3)}
  .dl svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7}

  .watch{width:100%;margin-top:clamp(2.6rem,6vw,3.8rem);display:flex;flex-direction:column;align-items:center}
  .watch .eyebrow{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;color:#fff;opacity:.9;margin-bottom:1.2rem}
  .video{position:relative;display:block;width:100%;max-width:540px;border-radius:12px;overflow:hidden;
    text-decoration:none;box-shadow:0 16px 40px rgba(0,0,0,.55);border:1px solid var(--hair-soft);
    aspect-ratio:16/9;background:#040b06;transition:transform .4s cubic-bezier(.2,.7,.2,1),border-color .3s,box-shadow .3s}
  .video:hover,.video:focus-visible{transform:translateY(-4px);border-color:var(--hair);box-shadow:0 16px 40px rgba(0,0,0,.55),0 0 24px rgba(57,255,139,.18)}
  .video:focus-visible{outline:2px solid var(--neon);outline-offset:4px}
  .video img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.85) brightness(.78);transition:filter .4s,transform .7s}
  .video:hover img{filter:saturate(1) brightness(.95);transform:scale(1.03)}
  .video .play{position:absolute;inset:0;display:grid;place-items:center}
  .video .play span{width:64px;height:64px;border-radius:50%;background:rgba(4,11,6,.55);backdrop-filter:blur(2px);
    border:1.5px solid var(--neon);box-shadow:0 0 16px rgba(57,255,139,.4);display:grid;place-items:center;
    transition:background .3s,transform .3s}
  .video:hover .play span{background:rgba(57,255,139,.92);transform:scale(1.06)}
  .video .play svg{width:21px;height:21px;margin-left:3px;fill:var(--neon)}
  .video:hover .play svg{fill:#04110a}
  .video .cap{position:absolute;left:0;right:0;bottom:0;padding:.85rem 1.1rem;
    background:linear-gradient(transparent,rgba(0,0,0,.92));font-size:.82rem;color:#fff;text-align:left}

  footer{margin-top:clamp(2.4rem,6vw,3.4rem);text-align:center;max-width:440px}
  footer .ded{font-family:"Fraunces",serif;font-style:italic;font-size:.95rem;color:#fff;line-height:1.6}

  @media (max-width:640px){
    body{padding:clamp(2.2rem,8vw,3.2rem) 1.25rem 3rem}
    header{margin-bottom:2.2rem}
    .title{white-space:nowrap;font-size:6.9vw;letter-spacing:.02em}
    .title.en{margin-top:.5rem}
    .rule{margin:1.4rem auto 1.3rem}
    .editions{grid-template-columns:1fr;gap:1.6rem;max-width:340px}
    .edition{padding:1.4rem 1.3rem 1.6rem}
    .flag-btn{max-width:250px}
    .lang{font-size:1.02rem;margin:1.1rem 0 .35rem}
    .hint{margin-bottom:1.05rem}
    .dl{padding:.65rem 1.2rem}
    .watch{margin-top:2.6rem}
    .watch .eyebrow{margin-bottom:1.1rem}
    .video{max-width:460px}
    footer{margin-top:2.4rem}
  }
  @media (prefers-reduced-motion:reduce){
    .flag-btn,.video,.video img,.dl,.video .play span,.edition{transition:none}
  }
</style>

  <script>
    (function(){
      var c = document.getElementById('rain'), x = c.getContext('2d');
      var glyphs = 'アイウエオカキクケコサシスセソ0123456789'.split('');
      var fs = 16, cols, drops, w, h;
      function resize(){
        w = window.innerWidth; h = window.innerHeight;
        c.width = w; c.height = h;
        cols = Math.max(1, Math.floor(w / fs));
        drops = new Array(cols).fill(0).map(function(){return Math.random()*-50;});
      }
      resize();
      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', function(){ setTimeout(resize, 200); });

      function step(){
        x.fillStyle = 'rgba(0,0,0,0.09)';
        x.fillRect(0,0,w,h);
        x.font = fs + "px monospace";
        for(var i=0;i<drops.length;i++){
          var ch = glyphs[Math.floor(Math.random()*glyphs.length)];
          var px = i*fs, py = drops[i]*fs;
          x.fillStyle = Math.random() > 0.97 ? 'rgba(180,255,210,0.9)' : 'rgba(57,255,139,0.55)';
          x.fillText(ch, px, py);
          if(py > h && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }

      var last = 0;
      function draw(t){
        if(t - last > 55){ last = t; step(); }
        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    })();
  </script>
